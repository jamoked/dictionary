<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictionary</title>

    <!-- Google Fonts: Inter (matches Obsidian's clean, modern feel) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind Play CDN — no build step needed.
       darkMode: 'class' means the 'dark' class on <html> controls dark mode.
       We extend colors to add our violet accent consistently. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] }
          }
        }
      };
    </script>

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body
    class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans min-h-screen transition-colors duration-200"
  >
    <!-- ── HEADER ─────────────────────────────────────────────────────────── -->
    <header
      class="sticky top-0 z-10 bg-gray-50/90 dark:bg-gray-950/90 backdrop-blur border-b border-gray-200 dark:border-gray-800"
    >
      <div
        class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between gap-4"
      >
        <span class="text-lg font-semibold tracking-tight">Dictionary</span>

        <nav class="flex items-center gap-1" role="tablist">
          <button
            id="tab-cards"
            role="tab"
            data-active="true"
            class="px-4 py-1.5 text-sm font-medium border-b-2 transition-colors"
            aria-controls="view-cards"
          >
            Learn
          </button>
          <button
            id="tab-study"
            role="tab"
            data-active="false"
            class="px-4 py-1.5 text-sm font-medium border-b-2 transition-colors"
            aria-controls="view-study"
          >
            Review
          </button>
        </nav>

        <button
          id="theme-toggle"
          aria-label="Toggle light/dark mode"
          class="w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors"
        ></button>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
      <!-- ── MY CARDS VIEW ─────────────────────────────────────────────────── -->
      <section id="view-cards">
        <!-- Search & filter -->
        <div class="flex flex-col sm:flex-row gap-3 mb-4">
          <input
            id="search-input"
            type="search"
            placeholder="Search 0 words…"
            class="flex-1 min-w-0 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-500 transition"
          />
          <select
            id="filter-pos"
            class="cursor-pointer rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 transition sm:w-36"
          >
            <option value="">Filter by…</option>
            <option value="noun">noun</option>
            <option value="verb">verb</option>
            <option value="adjective">adjective</option>
            <option value="adverb">adverb</option>
            <option value="pronoun">pronoun</option>
            <option value="preposition">preposition</option>
            <option value="conjunction">conjunction</option>
            <option value="interjection">interjection</option>
          </select>
          <select
            id="sort-group"
            class="cursor-pointer rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 transition sm:w-44"
          >
            <option value="alpha">Group by name</option>
            <option value="status">Group by status</option>
          </select>
        </div>

        <!-- Add a card trigger — opens the modal -->
        <button
          id="add-card-trigger"
          class="w-full flex items-center justify-center gap-2 text-sm font-medium text-violet-600 dark:text-violet-400 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-5 py-3 shadow-sm hover:border-violet-300 dark:hover:border-violet-700 hover:bg-violet-50 dark:hover:bg-violet-950 transition-colors mb-4"
        >
          + Add a card
        </button>

        <!-- Empty state -->
        <div
          id="empty-state"
          class="text-center py-16 text-gray-400 dark:text-gray-600"
        >
          <p class="text-lg">Add a card to get started.</p>
        </div>

        <!-- Card list (populated by app.js) -->
        <div
          id="card-list"
          class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"
        ></div>
      </section>

      <!-- ── STUDY VIEW ─────────────────────────────────────────────────────── -->
      <section id="view-study" class="hidden">
        <!-- Empty state for study -->
        <div
          id="study-empty"
          class="text-center py-16 text-gray-400 dark:text-gray-600 hidden"
        >
          <p class="text-lg">Add cards to your collection to review them.</p>
        </div>

        <!-- Flip card
           The outer div sets the 3D perspective. The inner div is what actually rotates.
           Front and back faces are stacked on top of each other; only the one facing
           the user is visible (the other has backface-visibility: hidden in styles.css). -->
        <div
          id="study-card"
          class="hidden cursor-pointer mb-6"
          style="height: 260px"
        >
          <div id="study-card-inner" class="study-card-inner">
            <!-- Front: word + part of speech -->
            <div
              id="study-front"
              class="study-card-face study-card-front bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm"
            >
              <p
                class="study-word text-3xl font-semibold text-gray-900 dark:text-gray-100 text-center mb-2"
              ></p>
              <p
                class="study-pos text-sm text-gray-400 dark:text-gray-500 text-center"
              ></p>
            </div>
            <!-- Back: definition -->
            <div
              id="study-back"
              class="study-card-face study-card-back bg-violet-50 dark:bg-violet-950 border border-violet-200 dark:border-violet-800"
            >
              <p
                class="study-definition text-base text-gray-700 dark:text-gray-300 text-center leading-relaxed"
              ></p>
            </div>
          </div>
        </div>

        <!-- Counter -->
        <p
          id="study-counter"
          class="text-center text-sm text-gray-400 dark:text-gray-500 mb-4"
        ></p>

        <!-- Status dots — shown between counter and nav controls -->
        <div id="study-status-row" class="hidden justify-center gap-2.5 mb-5">
          <button
            id="btn-status-new"
            class="w-4 h-4 rounded transition-colors"
            aria-label="Mark as new"
            title="New"
          ></button>
          <button
            id="btn-status-semi"
            class="w-4 h-4 rounded transition-colors"
            aria-label="Mark as learning"
            title="Learning"
          ></button>
          <button
            id="btn-status-known"
            class="w-4 h-4 rounded transition-colors"
            aria-label="Mark as known"
            title="Known"
          ></button>
        </div>

        <!-- Nav controls -->
        <div
          id="study-controls"
          class="hidden flex flex-wrap justify-center gap-3"
        >
          <button
            id="btn-prev"
            class="px-4 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
          >
            ← Prev
          </button>
          <button
            id="btn-shuffle"
            class="px-4 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
          >
            Shuffle
          </button>
          <button
            id="btn-next"
            class="px-4 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
          >
            Next →
          </button>
        </div>
      </section>
    </main>

    <!-- ── ADD / EDIT CARD MODAL ────────────────────────────────────────────── -->
    <div id="card-modal" class="modal-overlay">
      <div class="modal-dialog bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 id="form-title" class="text-base font-semibold">Add a card</h2>
          <button
            id="modal-close"
            aria-label="Close"
            class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <form id="card-form" class="flex flex-col gap-4" novalidate>
          <div class="flex flex-col gap-1">
            <label
              for="input-word"
              class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide"
              >Word</label
            >
            <input
              id="input-word"
              type="text"
              placeholder="e.g. ephemeral"
              required
              class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-500 transition"
            />
            <p id="word-error" class="hidden text-xs text-red-500 mt-0.5"></p>
          </div>

          <div class="flex flex-col gap-1">
            <label
              for="input-pos"
              class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide"
              >Part of speech</label
            >
            <select
              id="input-pos"
              required
              class="cursor-pointer rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 transition"
            >
              <option value="" disabled selected>Select…</option>
              <option value="noun">noun</option>
              <option value="verb">verb</option>
              <option value="adjective">adjective</option>
              <option value="adverb">adverb</option>
              <option value="pronoun">pronoun</option>
              <option value="preposition">preposition</option>
              <option value="conjunction">conjunction</option>
              <option value="interjection">interjection</option>
            </select>
          </div>

          <div class="flex flex-col gap-1">
            <label
              for="input-definition"
              class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide"
              >Definition</label
            >
            <textarea
              id="input-definition"
              rows="2"
              placeholder="e.g. lasting for a very short time"
              required
              class="rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-500 transition resize-none"
            ></textarea>
            <p id="definition-error" class="hidden text-xs text-red-500 mt-0.5"></p>
          </div>

          <div class="flex items-center gap-3">
            <button
              id="submit-btn"
              type="submit"
              class="bg-violet-600 hover:bg-violet-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors"
            >
              Add card
            </button>
            <button
              id="cancel-edit-btn"
              type="button"
              class="text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── VIEW CARD MODAL ───────────────────────────────────────────────────── -->
    <!-- Same visual layout as a list card, shown full-size in a modal. -->
    <div id="view-modal" class="modal-overlay">
      <div class="modal-dialog bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 w-full max-w-md shadow-xl flex flex-col gap-3">
        <div class="grid gap-x-3 gap-y-1 items-center" style="grid-template-columns: 1fr auto">
          <span id="view-word" class="text-lg font-semibold text-gray-900 dark:text-gray-100 leading-tight"></span>
          <div id="view-status-dots" class="flex gap-1.5 justify-end"></div>
          <span id="view-pos" class="text-xs italic text-gray-400 dark:text-gray-500"></span>
          <div class="flex gap-2 justify-end">
            <button id="view-edit-btn" class="text-gray-300 dark:text-gray-600 hover:text-violet-500 dark:hover:text-violet-400 transition-colors" aria-label="Edit">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            </button>
            <button id="view-delete-btn" class="text-gray-300 dark:text-gray-600 btn-delete transition-colors" aria-label="Delete">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        <p id="view-definition" class="text-gray-600 dark:text-gray-300 text-sm leading-relaxed"></p>
      </div>
    </div>

    <!-- ── DELETE CONFIRMATION MODAL ────────────────────────────────────────── -->
    <div id="confirm-modal" class="modal-overlay">
      <div class="modal-dialog bg-white dark:bg-gray-800 rounded-xl p-6 w-full max-w-sm shadow-xl">
        <p class="text-sm font-semibold text-gray-900 dark:text-gray-100 mb-1">Delete this card?</p>
        <p class="text-sm text-gray-400 dark:text-gray-500 mb-6">This cannot be undone.</p>
        <div class="flex justify-end gap-3 items-center">
          <button id="confirm-delete" class="bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">Delete</button>
          <button id="confirm-cancel" class="text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">Cancel</button>
        </div>
      </div>
    </div>

    <!-- ── DEV TOOLS PANEL ──────────────────────────────────────────────────── -->
    <!-- This panel is for testing and learning. Safe to remove when shipping. -->
    <footer class="mt-16 border-t border-gray-200 dark:border-gray-800">
      <div class="max-w-5xl mx-auto px-6 py-4">
        <button
          id="dev-toggle"
          class="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors font-mono"
        >
          Dev tools ▸
        </button>

        <div
          id="dev-panel"
          class="hidden mt-4 p-4 rounded-lg bg-gray-100 dark:bg-gray-900 border border-gray-200 dark:border-gray-800"
        >
          <p class="text-xs font-mono text-gray-500 dark:text-gray-400 mb-3">
            Also available in the browser console as
            <code class="bg-gray-200 dark:bg-gray-800 px-1 rounded"
              >window.dev</code
            >
          </p>
          <div class="flex flex-wrap gap-2 mb-3">
            <button
              id="dev-seed"
              class="text-xs font-mono px-3 py-1.5 rounded bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors"
            >
              Add sample cards
            </button>
            <button
              id="dev-clear"
              class="text-xs font-mono px-3 py-1.5 rounded bg-gray-200 dark:bg-gray-800 hover:bg-red-100 dark:hover:bg-red-950 hover:text-red-600 transition-colors"
            >
              Clear all data
            </button>
            <button
              id="dev-log"
              class="text-xs font-mono px-3 py-1.5 rounded bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors"
            >
              Log to console
            </button>
          </div>
          <p
            id="dev-count"
            class="text-xs font-mono text-gray-400 dark:text-gray-600"
          ></p>
        </div>
      </div>
    </footer>

    <!-- Scripts loaded in dependency order: storage → devtools → app -->
    <script src="js/storage.js"></script>
    <script src="js/devtools.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
