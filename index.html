<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!-- Apply theme classes before first paint so the status-bar area never
         flashes the wrong color. React effects run after paint, so the dark
         class AND the data-theme attribute must both be set here. -->
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        if (saved === "dark" || (!saved && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
        var color = localStorage.getItem("color-theme");
        if (color === "default") color = "slate"; // migrate the old name
        document.documentElement.setAttribute("data-theme", color || "obsidian");
      })();
    </script>
    <title>Dictionary</title>

    <!-- Google Fonts: Inter (matches the clean, modern Obsidian feel) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
